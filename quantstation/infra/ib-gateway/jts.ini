# ═══════════════════════════════════════════════════════
# QuantStation — IB Gateway Configuration (jts.ini)
# ═══════════════════════════════════════════════════════
# Headless, API-only mode for paper trading
# ═══════════════════════════════════════════════════════

[IBGateway]
ApiOnly=true
LocalServerPort=4002
WriteDebug=true

[Logon]
useSSL=true
Locale=en
s3store=true

[Communication]
Region=us
# Internal API settings
AcceptIncomingTcp=true
# Trust Docker subnet
TrustedIPs=172.18.0.0/16,127.0.0.1

[API]
# Paper trading port
ActivelyConnect=true
Precautionary=false
ReadOnlyLogin=false
PortNumber=4002

[ns]
# Override to disable news popups in headless
SuppressInfoMessages=true
