# ═══════════════════════════════════════════════════════
# QuantStation — Redis Configuration
# ═══════════════════════════════════════════════════════
# Ultra-low latency, pure in-memory configuration
# No persistence — Redis holds only volatile live state
# (PnL, Greeks matrix, active orders, position cache)
# ═══════════════════════════════════════════════════════

# ── Persistence: DISABLED ─────────────────────────────
# All state is reconstructable from QuestDB + IB Gateway
save ""
appendonly no

# ── Memory ────────────────────────────────────────────
maxmemory 2gb
maxmemory-policy allkeys-lru

# ── Network ───────────────────────────────────────────
bind 0.0.0.0
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── Performance ───────────────────────────────────────
# 100Hz internal timer for faster key expiry
hz 100
dynamic-hz yes

# Multi-threaded I/O (Apple Silicon has plenty of cores)
io-threads 4
io-threads-do-reads yes

# ── Clients ───────────────────────────────────────────
maxclients 1000

# ── Logging ───────────────────────────────────────────
loglevel notice

# ── Latency Monitoring ───────────────────────────────
# Alert if any operation takes >1ms
latency-monitor-threshold 1

# ── Keyspace Notifications ────────────────────────────
# Enable for key events (useful for strategy triggers)
notify-keyspace-events "Kx"
