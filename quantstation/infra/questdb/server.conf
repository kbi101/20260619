# ═══════════════════════════════════════════════════════
# QuantStation — QuestDB Server Configuration
# ═══════════════════════════════════════════════════════
# Tuned for NVMe massive ingestion on Apple Silicon
# ═══════════════════════════════════════════════════════

# ── Cairo (Storage Engine) ────────────────────────────
# Max uncommitted rows before forced commit
cairo.max.uncommitted.rows=500000

# Commit lag — how long to wait before flushing WAL
cairo.commit.lag=240000000

# SQL copy buffer for large imports
cairo.sql.copy.buffer.size=8388608

# ── ILP (InfluxDB Line Protocol — Tick Ingestion) ─────
# Worker count for ingestion (match Apple Silicon P-cores)
line.tcp.worker.count=4

# Commitment interval as fraction of uncommitted rows
line.tcp.commitment.interval.fraction=0.5

# Max measurement field count per line
line.tcp.max.measurement.size=32768

# Connection pool
line.tcp.net.active.connection.limit=32

# ── Shared Workers ────────────────────────────────────
shared.worker.count=4
shared.worker.affinity=0,1,2,3

# ── HTTP (Web Console & REST API) ─────────────────────
http.min.enabled=true
http.min.bind.to=0.0.0.0:9003

# Metrics endpoint for monitoring
metrics.enabled=true

# ── PG Wire Protocol ─────────────────────────────────
pg.enabled=true
pg.net.bind.to=0.0.0.0:8812
pg.worker.count=2

# ── WAL (Write-Ahead Log) ────────────────────────────
wal.enabled.default=true
wal.apply.worker.count=2

# ── Memory ────────────────────────────────────────────
# Let QuestDB use mapped files aggressively
cairo.o3.max.lag=600000000
