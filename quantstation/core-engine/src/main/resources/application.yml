# ═══════════════════════════════════════════════════════
# QuantStation — Spring Boot Application Configuration
# ═══════════════════════════════════════════════════════

spring:
  application:
    name: quantstation-core-engine
  threads:
    virtual:
      enabled: true

  # ── Redis ────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 500ms

  # ── Jackson ──────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ── Server ─────────────────────────────────────────────
server:
  port: 8080
  shutdown: graceful

# ── Actuator ───────────────────────────────────────────
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ── QuestDB ───────────────────────────────────────────
quantstation:
  questdb:
    host: ${QUESTDB_HOST:localhost}
    ilp-port: 9009
    pg-port: 8812
    flush-interval-ms: 100
    batch-size: 1000

  # ── IB Gateway ─────────────────────────────────────
  ibkr:
    host: ${IBKR_HOST:localhost}
    port: ${IBKR_PORT:4002}
    client-id: 1
    connect-timeout-ms: 5000
    reconnect-delay-ms: 3000
    max-reconnect-attempts: 999999

  # ── Alpha Vantage ──────────────────────────────────
  alphavantage:
    api-key: ${ALPHA_VANTAGE_API_KEY:}
    base-url: https://www.alphavantage.co/query
    rate-limit-per-minute: 5
    cache-ttl-minutes: 60

  # ── Massive.com (ex-Polygon.io) — Future ───────────
  massive:
    api-key: ${MASSIVE_API_KEY:}
    ws-url: wss://socket.massive.com/options
    enabled: false

  # ── Tick Router ────────────────────────────────────
  tick-router:
    ui-push-interval-ms: 50
    questdb-flush-interval-ms: 100

  # ── Risk Manager ───────────────────────────────────
  risk:
    max-position-size: 100
    max-daily-loss: 5000.0
    max-order-value: 50000.0
    require-confirmation-above: 10000.0

---
# ── Paper Trading Profile ────────────────────────────
spring:
  config:
    activate:
      on-profile: paper

quantstation:
  ibkr:
    port: ${IBKR_PORT:4002}

---
# ── Live Trading Profile ─────────────────────────────
spring:
  config:
    activate:
      on-profile: live

quantstation:
  ibkr:
    port: ${IBKR_PORT:4001}
  risk:
    require-confirmation-above: 5000.0
